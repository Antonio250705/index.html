    <style>

        body {
            font-family: 'Segoe UI' Arial, sans-serif;
            margin: 0px;
            background-image: url(./img/Gemini_Generated_Image_cwkv0acwkv0acwkv.png);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-size: 100% 100%;           
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
        }

        header {
            background-image: url(./img/Gemini_Generated_Image_ip9ow4ip9ow4ip9o.png);
            width: 100%;
            padding: 0.8rem 15;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: rgb(255, 255, 255);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            margin: 0 0 30px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8) ;
        }

        h1 {
            font-size: 1.8rem;
            color: #ffffff;
        }

        .principal {
            width: 95%; 
            margin: 0 auto; 
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 40px 20px; 
            justify-content: center;
            padding-bottom: 50px;
        }

        .principal a:hover {
            background-color: #ffe04d; 
            transform: scale(1.1);
        }

        .principal a:active {
            box-shadow: 0px 0px 0px #000; 
            transform: translate(4px, 4px); 
        }

        .caja, .caja2 {
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
            padding: 40px 20px;
            border-radius: 20px; 
            box-shadow: 8px 8px 0px rgba(0,0,0,0.9); /* Sombra sólida estilo retro */
            border: 3px solid #000;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .caja2 {
            margin-top: 20px;
        }

        .caja:hover, .caja2:hover {
            transform: translateY(-5px); /* Se eleva un poco al pasar el ratón */
        }

        .caja h1, .caja2 h1 {
            font-size: 1.5rem;
            color: #222;
            margin-bottom: 20px;
            min-height: 60px;
            display: flex;
            align-items: center;
        }
        
        .principal a {
           display: inline-block;
            padding: 12px 25px;
            background-color: #f8d020;
            color: #000;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            border: 3px solid #000;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        footer {
            background-color: rgba(0, 0, 0, 0.8);
            text-align: center; 
            padding: 20px 0;
            width: 100%;
            margin-top: auto;
            font-weight: bold;
            color: white;
            margin-top: auto;
        }

    </style>
</head>
<body>
