<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Antonio Javier García Corro">
    <title>Cronómetro</title>
    <style>
        * {
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #e7e7e7; 
        }
        header {
            background-color: #55935e; 
            color: white;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .timer-container {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            border: 4px dashed #3498db; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-align: center;
        }
        .timer-display {
            font-size: 4rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 30px;
            font-variant-numeric: tabular-nums; 
        }
        .ms-label {
            font-size: 1.5rem;
            color: #3498db;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .btn-start { background-color: #0093f5; color: white; }
        .btn-stop { background-color: #fc1b03; color: white; }
        .btn-reset { background-color: #646464; color: white; }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        footer {
            background-color: #55935e;
            color: #ffffff;
            padding: 1rem;
            text-align: center;
            font-weight: bold;
            border-top: 1px solid #dcdde1;
        }
        .boton-volver {
            margin-bottom: 50px;
            margin-left: 400px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>CRONÓMETRO JAVASCRIPT</h1>
    </header>

    <main>
        <div class="timer-container">
            <div class="timer-display">
                <span id="min">00</span>:<span id="sec">00</span><span class="ms-label">.<span id="ms">000</span></span>
            </div>

            <div class="controls">
                <button class="btn btn-start" onclick="start()">Iniciar</button>
                <button class="btn btn-stop" onclick="stop()">Detener</button>
                <button class="btn btn-reset" onclick="reset()">Reiniciar</button>
            </div>
        </div>
    </main>

    <a href="../../../trabajos/eventos/src/indexEventos.html" class="boton-volver">Volver a Eventos </a>

    <footer>
        <p>Realizado por <strong>Antonio Javier García Corro</strong></p>
    </footer>

    <script>
        let time = 0;
        let interval = null;

        const displayMin = document.getElementById('min');
        const displaySec = document.getElementById('sec');
        const displayMs = document.getElementById('ms');

        function update() {
            time += 10;
            let m = Math.floor(time / 60000);
            let s = Math.floor((time % 60000) / 1000);
            let ms = time % 1000;

            displayMin.textContent = String(m).padStart(2, '0');
            displaySec.textContent = String(s).padStart(2, '0');
            displayMs.textContent = String(ms).padStart(3, '0');
        }

        function start() {
            if (!interval) {
                interval = setInterval(update, 10);
            }
        }

        function stop() {
            clearInterval(interval);
            interval = null;
        }

        function reset() {
            stop();
            time = 0;
            displayMin.textContent = '00';
            displaySec.textContent = '00';
            displayMs.textContent = '000';
        }
    </script>
</body>
</html>
