<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Antonio Javier García Corro">
    <title>Calculadora</title>
    <link rel="stylesheet" href="calc.css">
  </head>

  <body>
    <div class="calculadora">
      <div class="pantalla">
        <input type="text" id="resultado" disabled>
      </div>
      <div class="teclado">
        <button onclick="limpiar()">C</button>
        <button onclick="borrar()">CE</button>
        <button onclick="operar('/')">÷</button>
        <button onclick="operar('*')">x</button>        
        <button onclick="agregarNumero('7')">7</button>
        <button onclick="agregarNumero('8')">8</button>
        <button onclick="agregarNumero('9')">9</button>
        <button onclick="operar('-')">-</button>      
        <button onclick="agregarNumero('4')">4</button>
        <button onclick="agregarNumero('5')">5</button>
        <button onclick="agregarNumero('6')">6</button>
        <button onclick="operar('+')">+</button>      
        <button onclick="agregarNumero('1')">1</button>
        <button onclick="agregarNumero('2')">2</button>
        <button onclick="agregarNumero('3')">3</button>
        <button onclick="operarEspecial('1/x')">1/x</button>
        <button onclick="agregarNumero('0')">0</button>
        <button onclick="agregarNumero('.')">.</button>
        <button onclick="operarEspecial('raiz')">√</button>
        <button onclick="operarEspecial('x2')">x²</button>
        <button onclick="operarEspecial('bin')">Bin</button>
        <button onclick="operarEspecial('hex')">Hex</button>
        <button class="doble" onclick="calcular()">=</button>
      </div>
    </div>
    <a href="../../index3.html" class="boton-volver">Volver a Index </a>

    <script src="calc.js"></script>
  </body>
</html>
