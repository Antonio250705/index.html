<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Antonio Javier García Corro">
    <title>Tabla de multiplicar</title>
    <style>
        /* Reseteo básico para que el header y footer lleguen a los bordes */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Color verde basado en tu imagen de deportes. 
               Si prefieres el azul de tu index, cámbialo a #5eb8f0 */
            --color-principal: #5b9b68; 
            --color-bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--color-bg);
            /* Flexbox para mantener el footer siempre abajo */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- NUEVO HEADER Y FOOTER --- */
        header, footer {
            background-color: var(--color-principal);
            color: white;
            text-align: center;
            padding: 1.5rem;
        }

        header h1 {
            font-size: 28px;
            font-weight: bold;
        }

        footer {
            margin-top: auto; /* Empuja el footer hacia el final de la página */
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        main {
            flex-grow: 1;
            padding: 40px 20px;
            max-width: 1000px;
            margin: 0 auto; 
            width: 100%;
        }

        .formulario {
            margin-bottom: 40px;
            text-align: center; /* Centramos el formulario */
        }
        
        .formulario label {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
        }

        .formulario input {
            padding: 5px;
            font-size: 1rem;
            width: 60px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            margin-top: 15px;
            padding: 10px 25px;
            cursor: pointer;
            background-color: var(--color-principal);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.85;
        }

        /* --- ESTILOS MEJORADOS PARA LAS TABLAS --- */
        #pantallaResultados {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .columna-tabla {
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            font-family: monospace; 
            font-size: 16px;
            line-height: 1.6;
            min-width: 160px;
            border: 1px solid #eee;
        }

        /* Ocultamos el div limpiador porque ahora usamos Flexbox en lugar de float */
        .limpiar {
            display: none;
        }

        .error {
            color: #d9534f;
            font-weight: bold;
            text-align: center;
            width: 100%;
            font-family: sans-serif;
        }
        .boton-volver {
            margin-bottom: 50px;
            margin-left: 400px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    
    <header>
        <h1>Generador de tablas de multiplicar</h1>
    </header>

    <main>
        <div class="formulario">
            <label>Número de tablas de multiplicar a generar: </label>
            <input type="number" id="numTablas" value="3">
            <br>
            <button onclick="generarTablas()">Calcular</button>
        </div>

        <div id="pantallaResultados"></div>
    </main>

     <a href="../../../trabajos/../index3.html" class="boton-volver">Volver a Index </a>


    <footer>
        <p>Realizado por Antonio Javier García Corro</p>
    </footer>

    <script>
        // Todo con 'var' y concatenación tradicional para que parezca de estudiante
        function generarTablas() {
            var inputNumero = document.getElementById("numTablas").value;
            var cantidad = parseInt(inputNumero);
            var resultados = document.getElementById("pantallaResultados");
            
            // Limpiamos la pantalla antes de empezar por si ya había tablas calculadas
            resultados.innerHTML = "";

            // Validación básica
            if (isNaN(cantidad) || cantidad <= 0) {
                resultados.innerHTML = "<p class='error'>Por favor, introduce un número mayor que 0.</p>";
                return; // Cortamos la ejecución aquí
            }

            // Variable donde iremos acumulando todo el texto HTML
            var textoHtml = "";

            // BUCLE EXTERNO: Cuenta desde la tabla del 1 hasta el número introducido
            for (var i = 1; i <= cantidad; i++) {
                
                // Abrimos el DIV de la columna
                textoHtml = textoHtml + "<div class='columna-tabla'>";
                
                // BUCLE INTERNO: Multiplica el número actual (i) del 0 al 10
                for (var j = 0; j <= 10; j++) {
                    var resultadoMultiplicacion = i * j;
                    
                    // Concatenamos la línea (ejemplo: 1 X 0 = 0)
                    textoHtml = textoHtml + i + " X " + j + " = " + resultadoMultiplicacion + "<br>";
                }
                
                // Cerramos el DIV de la columna
                textoHtml = textoHtml + "</div>";
            }

            // Añadimos un div limpiador al final (ya no afecta al diseño gracias a Flexbox, pero mantenemos tu lógica)
            textoHtml = textoHtml + "<div class='limpiar'></div>";

            // Finalmente, metemos todo el bloque de texto en el HTML
            resultados.innerHTML = textoHtml;
        }
    </script>
</body>
</html>
