    <title>Ejercicios XML </title>
<style>
    body{
        background-color: #d3ccbf;
        color: #33291f;
        padding: 0;
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
    }
    header {
    background-color: #9e9992;
    color: #000000;
    text-align: center;
    box-shadow: 0 2px 5px;
    padding: 20px 10px;
    margin-bottom: 30px;
    margin-top: 20px; 
    border-radius: 8px; 
}
    .contenedor{
        background-color: #e4dfcd; 
        border: 2px solid #a0522d; 
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        margin: 20px;
    }
    h3{
        color: #000000;
        text-align: center;
        margin-top: 0;
    }
    section.uno{
        background-color: #bdb7af;
        padding: 20px;
        border-radius: 5px;
        margin-bottom: 20px;
    }

    .grid-ejercicios {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-top: 10px;
    }
    .boton-archivo {
        text-decoration: none;
        display: block;
        background-color: #969079;
        color: white;
        padding: 12px;
        border-radius: 5px;
        border-bottom: 4px solid #000000;
        text-align: center;
        transition: transform 0.2s;
    }
    .boton-archivo:hover {
        transform: translateY(-2px);
        background-color: #a1753b;
    }
    footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.8em;
    }
    .boton-volver-contenedor {
        margin: 40px 0;
        display: flex;
        justify-content: center;
    }
    .boton-volver {
        text-decoration: none;
        background-color: #1e293b;
        color: white;
        padding: 12px 25px;
        border-radius: 50px;
        font-weight: 500;
    }
</style>
</head>
<body>
   <header>

    </header>

        <section class="uno">

        </section>
