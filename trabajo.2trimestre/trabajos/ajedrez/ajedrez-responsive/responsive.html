<h2 class="boton-volver"><a href="../ajedrez.html">Volver a tableros</a></h2>

<!--hacemos que sea movible empleando foreach--> 
<script>
    const casillas = document.querySelectorAll('.casilla')

    let origen = null;

    casillas.forEach((casilla) => {
        casilla.addEventListener('click', () => {
            if (origen) {
                if (casilla == origen) {
                    alert('¡No muevas al mismo lugar!')
                    origen = null;
                }

                casilla.innerHTML = origen.innerHTML
                origen.innerHTML = ''
                origen = null;
            }

            else {
                if(casilla.querySelector('img')) {
                    origen = casilla;
                }
            }
        })
    })
</script>
